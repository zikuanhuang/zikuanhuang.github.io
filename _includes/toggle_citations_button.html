<!-- _includes/toggle_citations_button.html - FIXED VERSION -->
<div class="citation-toggle-wrapper" style="display: inline-block; margin-left: 15px;">
  <button id="toggleCitationsBtn" 
          class="btn btn-sm btn-outline-primary"
          style="border-radius: 20px; font-size: 0.85rem;">
    <i class="fas fa-chart-line"></i> Google Scholar Statistics
    <span id="toggleStatusBadge" class="badge bg-secondary ms-1">OFF</span>
  </button>
</div>

<style>
  .citation-toggle-wrapper button {
    transition: all 0.3s ease;
  }
  .citation-toggle-wrapper button.active {
    background-color: #4285F4;
    color: white;
    border-color: #4285F4;
  }
  .citation-toggle-wrapper button.active .badge {
    background-color: #ffd700 !important;
    color: #333;
  }
  .citation-count-hidden {
    display: none !important;
  }
</style>

<script>
document.addEventListener('DOMContentLoaded', function() {
  // Check if we're on the publications page
  const isPublicationsPage = window.location.pathname === '/publications/' || 
                             window.location.pathname === '/publications.html';
  
  // Only run on publications page
  if (!isPublicationsPage) {
    return;
  }
  
  const toggleBtn = document.getElementById('toggleCitationsBtn');
  const statusBadge = document.getElementById('toggleStatusBadge');
  
  // Load saved preference - DON'T reset it!
  let citationsVisible = localStorage.getItem('googleScholarCitationsVisible');
  
  // If never set before, default to false (OFF)
  if (citationsVisible === null) {
    citationsVisible = 'false';
    localStorage.setItem('googleScholarCitationsVisible', 'false');
  }
  
  // Convert string to boolean
  const shouldShow = citationsVisible === 'true';
  
  function updateCitationVisibility(show) {
    const citationElements = document.querySelectorAll('.scholar-badge, .citation-badge, a[href*="scholar.google.com/citations"]');
    
    citationElements.forEach(el => {
      if (show) {
        el.classList.remove('citation-count-hidden');
        el.style.display = '';
      } else {
        el.classList.add('citation-count-hidden');
        el.style.display = 'none';
      }
    });
    
    // Update button state
    if (show) {
      toggleBtn.classList.add('active');
      statusBadge.textContent = 'ON';
      statusBadge.classList.remove('bg-secondary');
      statusBadge.classList.add('bg-success');
    } else {
      toggleBtn.classList.remove('active');
      statusBadge.textContent = 'OFF';
      statusBadge.classList.remove('bg-success');
      statusBadge.classList.add('bg-secondary');
    }
  }
  
  // Apply the saved preference (don't force to false!)
  updateCitationVisibility(shouldShow);
  
  // Toggle on click - preserve the state
  toggleBtn.addEventListener('click', function() {
    // Get current state from localStorage (not from button visual)
    const currentState = localStorage.getItem('googleScholarCitationsVisible') === 'true';
    const newState = !currentState;
    
    // Save to localStorage
    localStorage.setItem('googleScholarCitationsVisible', newState);
    
    // Update visibility
    updateCitationVisibility(newState);
  });
});
</script>
