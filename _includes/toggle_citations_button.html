<!-- _includes/toggle_citations_button.html - DOM Manipulation Version -->
<div class="citation-toggle-wrapper" style="display: inline-block; margin-left: 15px;">
  <button id="toggleCitationsBtn" 
          class="btn btn-sm btn-outline-primary"
          style="border-radius: 20px; font-size: 0.85rem;">
    <i class="fas fa-chart-line"></i> Google Scholar Statistics
    <span id="toggleStatusBadge" class="badge bg-secondary ms-1">OFF</span>
  </button>
</div>

<style>
  .citation-toggle-wrapper button {
    transition: all 0.3s ease;
  }
  .citation-toggle-wrapper button.active {
    background-color: #4285F4;
    color: white;
    border-color: #4285F4;
  }
  .citation-toggle-wrapper button.active .badge {
    background-color: #ffd700 !important;
    color: #333;
  }
</style>

<script>
document.addEventListener('DOMContentLoaded', function() {
  const toggleBtn = document.getElementById('toggleCitationsBtn');
  const statusBadge = document.getElementById('toggleStatusBadge');
  
  // Store removed elements to restore them later
  let removedCitations = new Map(); // key: parent element, value: original element
  
  // Load saved preference
  const citationsVisible = localStorage.getItem('googleScholarCitationsVisible') === 'true';
  
  function removeAllCitations() {
    // Find all Google Scholar citation elements
    const citations = document.querySelectorAll('.scholar-badge, .citation-badge, a[href*="scholar.google.com/citations"]');
    
    citations.forEach(citation => {
      const parent = citation.parentNode;
      const nextSibling = citation.nextSibling;
      
      // Store info to restore later
      if (!removedCitations.has(citation)) {
        removedCitations.set(citation, {
          parent: parent,
          nextSibling: nextSibling,
          element: citation
        });
      }
      
      // Remove the element from DOM
      if (citation.parentNode) {
        citation.parentNode.removeChild(citation);
      }
    });
  }
  
  function restoreAllCitations() {
    // Restore all removed citation elements
    removedCitations.forEach((data, citation) => {
      if (data.parent && !data.element.parentNode) {
        // Insert back at original position
        if (data.nextSibling && data.nextSibling.parentNode) {
          data.parent.insertBefore(data.element, data.nextSibling);
        } else {
          data.parent.appendChild(data.element);
        }
      }
    });
    
    // Clear the map after restoring
    removedCitations.clear();
  }
  
  function updateCitations(show) {
    if (show) {
      restoreAllCitations();
      toggleBtn.classList.add('active');
      statusBadge.textContent = 'ON';
      statusBadge.classList.remove('bg-secondary');
      statusBadge.classList.add('bg-success');
    } else {
      removeAllCitations();
      toggleBtn.classList.remove('active');
      statusBadge.textContent = 'OFF';
      statusBadge.classList.remove('bg-success');
      statusBadge.classList.add('bg-secondary');
    }
  }
  
  // Set initial state
  updateCitations(citationsVisible);
  
  // Toggle on click
  toggleBtn.addEventListener('click', function() {
    const newState = !(localStorage.getItem('googleScholarCitationsVisible') === 'true');
    localStorage.setItem('googleScholarCitationsVisible', newState);
    updateCitations(newState);
  });
});
</script>
