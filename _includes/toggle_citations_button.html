<div class="citation-toggle-wrapper" style="display: inline-block; margin-left: 15px;">
  <button id="toggleCitationsBtn" 
          class="btn btn-sm btn-outline-primary"
          style="border-radius: 20px; font-size: 0.85rem;">
    <i class="fas fa-chart-line"></i> Google Scholar Statistics
    <span id="toggleStatusBadge" class="badge bg-secondary ms-1">OFF</span>
  </button>
</div>

<style>
  .citation-toggle-wrapper button {
    transition: all 0.3s ease;
  }
  .citation-toggle-wrapper button.active {
    background-color: #4285F4;
    color: white;
    border-color: #4285F4;
  }
  .citation-toggle-wrapper button.active .badge {
    background-color: #ffd700 !important;
    color: #333;
  }
  .citation-count-hidden {
    display: none !important;
  }
  .citation-count-visible {
    display: inline-flex !important;
  }
</style>

<script>
document.addEventListener('DOMContentLoaded', function() {
  const toggleBtn = document.getElementById('toggleCitationsBtn');
  const statusBadge = document.getElementById('toggleStatusBadge');
  
  // Load saved preference from localStorage
  const citationsVisible = localStorage.getItem('googleScholarCitationsVisible') === 'true';
  
  function updateCitationVisibility(show) {
    // Look for Google Scholar citation badges
    const citationElements = document.querySelectorAll('.scholar-badge, .citation-badge, a[href*="scholar.google.com"]');
    citationElements.forEach(el => {
      if (show) {
        el.classList.remove('citation-count-hidden');
        el.classList.add('citation-count-visible');
        el.style.display = 'inline-flex';
      } else {
        el.classList.remove('citation-count-visible');
        el.classList.add('citation-count-hidden');
        el.style.display = 'none';
      }
    });
    
    // Update button state
    if (show) {
      toggleBtn.classList.add('active');
      statusBadge.textContent = 'ON';
      statusBadge.classList.remove('bg-secondary');
      statusBadge.classList.add('bg-success');
      console.log('Citations are now VISIBLE');
    } else {
      toggleBtn.classList.remove('active');
      statusBadge.textContent = 'OFF';
      statusBadge.classList.remove('bg-success');
      statusBadge.classList.add('bg-secondary');
      console.log('Citations are now HIDDEN');
    }
  }
  
  // Set initial state
  updateCitationVisibility(citationsVisible);
  
  // Toggle on click
  toggleBtn.addEventListener('click', function() {
    const newState = !(localStorage.getItem('googleScholarCitationsVisible') === 'true');
    localStorage.setItem('googleScholarCitationsVisible', newState);
    updateCitationVisibility(newState);
  });
});
</script>
